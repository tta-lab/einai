version: "2"

run:
  timeout: 5m

linters:
  enable:
    - asciicheck
    - bidichk
    - bodyclose
    - contextcheck
    - copyloopvar
    - dupl
    - durationcheck
    - errcheck
    - errname
    - errorlint
    - execinquery
    - gocyclo
    - gofmt
    - goheader
    - goimports
    - goprintffuncname
    - gosimple
    - govet
    - ineffassign
    - lll
    - misspell
    - nakedret
    - nilerr
    - nilness
    - noctx
    - nonamedreturns
    - prealloc
    - staticcheck
    - unconvert
    - unparam
    - unused
    - whitespace
    - zerologlint

linters-settings:
  gocyclo:
    min-complexity: 15
  lll:
    line-length: 120

issues:
  exclude-use-default: false
  max-issues-per-linter: 50
  max-same-issues: 10

output:
  format: colored-line-number
